name: Bug report
description: Report a reproducible problem with better-scrollbar.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Link to a reproduction or paste the smallest code sample that shows the issue.
      render: tsx
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: better-scrollbar version
      placeholder: "1.0.2"
    validations:
      required: true
  - type: input
    id: react-version
    attributes:
      label: React and React DOM versions
      placeholder: "react@18.2.0, react-dom@18.2.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and operating system
      placeholder: "Chrome 126 on macOS 15"
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add screenshots, logs, or other details that may help diagnose the issue.
